<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宁波诺丁汉大学附属中学 · 车辆信息查询</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        /* 头部标题 */
        .header {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
            text-align: center;
            border-bottom: 3px solid #667eea;
        }
        
        .header h1 {
            color: #2d3748;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        
        .header .subtitle {
            color: #718096;
            font-size: 0.9rem;
        }
        
        /* 统计卡片 */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .stat-card {
            border-radius: 12px;
            padding: 16px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }
        
        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        
        .stat-card.active {
            outline: 3px solid white;
            outline-offset: -3px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.25);
        }
        
        .stat-card .number {
            font-size: 2rem;
            font-weight: 700;
            color: white;
        }
        
        .stat-card .label {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.9);
            margin-top: 4px;
        }
        
        .stat-card[data-color="blue"] { background: linear-gradient(135deg, #667eea 0%, #5a6fd6 100%); }
        .stat-card[data-color="red"] { background: linear-gradient(135deg, #f5627d 0%, #e84566 100%); }
        .stat-card[data-color="orange"] { background: linear-gradient(135deg, #f5a623 0%, #e8951a 100%); }
        .stat-card[data-color="teal"] { background: linear-gradient(135deg, #38c9b5 0%, #2bb5a2 100%); }
        .stat-card[data-color="green"] { background: linear-gradient(135deg, #52c41a 0%, #45a817 100%); }
        .stat-card[data-color="purple"] { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); }
        
        /* 搜索区域 */
        .search-box {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .search-input-wrapper {
            position: relative;
            margin-bottom: 16px;
        }
        
        .search-input {
            width: 100%;
            padding: 14px 50px 14px 45px;
            font-size: 1rem;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102,126,234,0.1);
        }
        
        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.2rem;
            color: #a0aec0;
        }
        
        .clear-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: #e2e8f0;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            color: #718096;
            font-size: 14px;
        }
        
        .clear-btn.visible {
            display: flex;
        }
        
        /* 车辆类型筛选 */
        .filter-tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        
        .filter-tab {
            padding: 8px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            background: rgba(255,255,255,0.8);
            cursor: pointer;
            font-size: 0.9rem;
            color: #4a5568;
            transition: all 0.3s ease;
        }
        
        .filter-tab:hover {
            border-color: #667eea;
            color: #667eea;
        }
        
        .filter-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
        }
        
        .filter-tab.search-tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        
        /* 结果区域 */
        .results {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.15);
        }
        
        .results-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .results-count {
            color: #4a5568;
            font-size: 0.95rem;
        }
        
        .results-count strong {
            color: #667eea;
        }
        
        /* 表格样式 */
        .table-wrapper {
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 600px;
        }
        
        th {
            background: #f7fafc;
            padding: 14px 16px;
            text-align: left;
            font-weight: 600;
            color: #4a5568;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        
        td {
            padding: 12px 16px;
            border-bottom: 1px solid #e2e8f0;
            color: #2d3748;
        }
        
        tr:hover {
            background: #f7fafc;
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        /* 高亮 */
        .highlight {
            background: linear-gradient(120deg, #ffeaa7 0%, #ffeaa7 100%);
            background-repeat: no-repeat;
            background-size: 100% 40%;
            background-position: 0 90%;
            padding: 0 2px;
        }
        
        /* 车辆类型标签 */
        .type-tag {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }
        
        .type-teacher {
            background: #e6f3ff;
            color: #1890ff;
        }
        
        .type-parent {
            background: #fff0f0;
            color: #ff4d4f;
        }
        
        .type-temp {
            background: #fff7e6;
            color: #fa8c16;
        }
        
        .type-logistics {
            background: #e6fffb;
            color: #13c2c2;
        }
        
        .type-group {
            background: #f6ffed;
            color: #52c41a;
        }
        
        /* 过期行 */
        tr.expired {
            background: #fff2f0;
        }
        
        tr.expired td {
            color: #cf1322;
        }
        
        tr.expired:hover {
            background: #ffebe8;
        }
        
        .expired-badge {
            display: inline-block;
            background: #cf1322;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.75rem;
            margin-left: 8px;
        }
        
        /* 空状态 */
        .empty-state {
            padding: 60px 20px;
            text-align: center;
            color: #a0aec0;
        }
        
        .empty-state .icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        
        .empty-state h3 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: #718096;
        }
        
        /* Loading */
        .loading {
            padding: 60px 20px;
            text-align: center;
            color: #667eea;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 页脚 */
        .footer {
            text-align: center;
            padding: 20px;
            color: rgba(255,255,255,0.8);
            font-size: 0.85rem;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }
            
            .header h1 {
                font-size: 1.2rem;
            }
            
            .stats {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
            }
            
            .stat-card {
                padding: 12px 8px;
            }
            
            .stat-card .number {
                font-size: 1.5rem;
            }
            
            .stat-card .label {
                font-size: 0.75rem;
            }
            
            .filter-tab {
                padding: 6px 12px;
                font-size: 0.85rem;
            }
            
            th, td {
                padding: 10px 12px;
            }
            
            table {
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .stats {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .filter-tabs {
                justify-content: center;
            }
            
            .results-header {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>宁波诺丁汉大学附属中学</h1>
            <div class="subtitle">车辆信息查询系统</div>
        </div>
        
        <!-- 搜索区域 -->
        <div class="search-box">
            <div class="search-input-wrapper">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="searchInput" placeholder="输入车牌号或车主姓名搜索...">
                <button class="clear-btn" id="clearBtn">✕</button>
            </div>
            <div class="filter-tabs" id="filterTabs">
                <div class="filter-tab active" data-filter="all">全部</div>
            </div>
        </div>
        
        <!-- 结果区域 -->
        <div class="results">
            <div class="results-header">
                <div class="results-count">共 <strong id="resultCount">0</strong> 条记录</div>
            </div>
            <div id="resultsContainer">
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <div>加载中...</div>
                </div>
            </div>
        </div>
        
        <!-- 页脚 -->
        <div class="footer">
            © 2024 宁波诺丁汉大学附属中学
        </div>
    </div>

    <script>
        // 全局数据
        let allData = [];
        let filteredData = [];
        let currentFilters = new Set(['教师车辆', '后勤车辆']); // 默认选中教师和后勤
        let searchKeyword = '';

        // 初始化
        document.addEventListener('DOMContentLoaded', async () => {
            await loadData();
            initEventListeners();
        });

        // 加载数据
        async function loadData() {
            try {
                const response = await fetch('data.json');
                if (!response.ok) throw new Error('数据加载失败');
                allData = await response.json();
                
                // 预处理数据
                allData.forEach(item => {
                    // 提取拼音首字母用于搜索
                    item.pinyinInitial = getPinyinInitial(item.name);
                });
                
                // 渲染筛选
                renderFilterTabs();
                
                // 初始不显示结果，等用户搜索
                document.getElementById('resultCount').textContent = '0';
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <h3>请输入车牌号或车主姓名搜索</h3>
                        <p>支持模糊匹配，输入即搜索</p>
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">⚠️</div>
                        <h3>数据加载失败</h3>
                        <p>请确保 data.json 文件存在且可访问</p>
                    </div>
                `;
                console.error(error);
            }
        }

        // 简单的拼音首字母获取（覆盖常见汉字）
        function getPinyinInitial(str) {
            const pinyinMap = {
                '阿': 'A', '啊': 'A', '爱': 'A',
                '白': 'B', '百': 'B', '班': 'B', '鲍': 'B', '包': 'B', '柏': 'B',
                '曹': 'C', '陈': 'C', '程': 'C', '崔': 'C', '常': 'C', '丛': 'C',
                '戴': 'D', '丁': 'D', '杜': 'D', '邓': 'D',
                '范': 'F', '方': 'F', '冯': 'F', '傅': 'F',
                '高': 'G', '顾': 'G', '管': 'G', '龚': 'G', '郭': 'G', '葛': 'G',
                '胡': 'H', '黄': 'H', '何': 'H', '贺': 'H', '郝': 'H', '韩': 'H',
                '蒋': 'J', '金': 'J', '贾': 'J', '江': 'J', '姜': 'J', '纪': 'J', '焦': 'J',
                '柯': 'K', '孔': 'K',
                '刘': 'L', '李': 'L', '林': 'L', '梁': 'L', '卢': 'L', '陆': 'L', '罗': 'L', '柳': 'L', '龙': 'L', '凌': 'L',
                '马': 'M', '孟': 'M', '毛': 'M', '梅': 'M',
                '倪': 'N', '娜': 'N',
                '潘': 'P', '彭': 'P',
                '秦': 'Q', '邱': 'Q', '戚': 'Q',
                '任': 'R', '阮': 'R',
                '苏': 'S', '宋': 'S', '沈': 'S', '施': 'S', '史': 'S', '石': 'S', '孙': 'S', '邵': 'S',
                '汤': 'T', '唐': 'T', '陶': 'T', '田': 'T', '童': 'T',
                '王': 'W', '吴': 'W', '魏': 'W', '汪': 'W', '邬': 'W', '温': 'W',
                '徐': 'X', '谢': 'X', '夏': 'X', '熊': 'X', '萧': 'X', '许': 'X', '项': 'X', '向': 'X', '习': 'X',
                '严': 'Y', '杨': 'Y', '姚': 'Y', '叶': 'Y', '俞': 'Y', '袁': 'Y', '余': 'Y', '于': 'Y', '虞': 'Y', '岳': 'Y', '颜': 'Y',
                '张': 'Z', '郑': 'Z', '周': 'Z', '朱': 'Z', '赵': 'Z', '钟': 'Z', '邹': 'Z', '章': 'Z', '曾': 'Z', '庄': 'Z', '卓': 'Z', '祝': 'Z'
            };
            
            let result = '';
            for (let char of str) {
                if (pinyinMap[char]) {
                    result += pinyinMap[char];
                }
            }
            return result;
        }

        // 渲染统计卡片 - 已删除，不再显示

        // 渲染车辆类型筛选标签
        function renderFilterTabs() {
            const types = [...new Set(allData.map(item => item.department))];
            let html = `<div class="filter-tab search-tab" data-filter="all">搜索</div>`;
            
            types.forEach(type => {
                const isActive = currentFilters.has(type) ? ' active' : '';
                html += `<div class="filter-tab${isActive}" data-filter="${type}">${type}</div>`;
            });
            
            document.getElementById('filterTabs').innerHTML = html;
        }

        // 初始化事件监听
        function initEventListeners() {
            // 搜索输入
            const searchInput = document.getElementById('searchInput');
            searchInput.addEventListener('input', (e) => {
                searchKeyword = e.target.value.trim().toLowerCase();
                const clearBtn = document.getElementById('clearBtn');
                clearBtn.classList.toggle('visible', searchKeyword.length > 0);
                filterData();
            });
            
            // 清除按钮
            document.getElementById('clearBtn').addEventListener('click', () => {
                searchInput.value = '';
                searchKeyword = '';
                document.getElementById('clearBtn').classList.remove('visible');
                // 清空后显示提示
                document.getElementById('resultCount').textContent = '0';
                document.getElementById('resultsContainer').innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <h3>请输入车牌号或车主姓名搜索</h3>
                        <p>支持模糊匹配，输入即搜索</p>
                    </div>
                `;
            });
            
            // 筛选标签点击（支持多选）
            document.getElementById('filterTabs').addEventListener('click', (e) => {
                if (e.target.classList.contains('filter-tab')) {
                    const filter = e.target.dataset.filter;
                    
                    if (filter === 'all') {
                        // 点击"搜索"：全选或全不选
                        if (currentFilters.size === allData.map(item => item.department).filter((v, i, a) => a.indexOf(v) === i).length) {
                            currentFilters.clear();
                        } else {
                            const types = [...new Set(allData.map(item => item.department))];
                            currentFilters = new Set(types);
                        }
                    } else {
                        // 点击具体类型：切换选中状态
                        if (currentFilters.has(filter)) {
                            currentFilters.delete(filter);
                        } else {
                            currentFilters.add(filter);
                        }
                    }
                    
                    // 更新标签激活状态
                    document.querySelectorAll('.filter-tab').forEach(tab => {
                        if (tab.dataset.filter === 'all') {
                            tab.classList.toggle('active', currentFilters.size === [...new Set(allData.map(item => item.department))].length);
                        } else {
                            tab.classList.toggle('active', currentFilters.has(tab.dataset.filter));
                        }
                    });
                    
                    filterData();
                }
            });
            
            // 统计卡片点击 - 已删除
        }

        // 筛选数据
        function filterData() {
            // 没有搜索关键词时不显示结果
            if (!searchKeyword) {
                filteredData = [];
                renderResults();
                return;
            }
            
            filteredData = allData.filter(item => {
                // 车辆类型筛选（多选）
                if (currentFilters.size > 0 && !currentFilters.has(item.department)) {
                    return false;
                }
                
                // 搜索筛选
                const nameMatch = item.name.toLowerCase().includes(searchKeyword) ||
                                 item.pinyinInitial.toLowerCase().includes(searchKeyword.toUpperCase());
                const plateMatch = item.plate.toLowerCase().includes(searchKeyword);
                return nameMatch || plateMatch;
            });
            
            // 按过期状态和名称排序
            filteredData.sort((a, b) => {
                const aExpired = isExpired(a.expireDate);
                const bExpired = isExpired(b.expireDate);
                if (aExpired !== bExpired) return aExpired ? -1 : 1;
                return a.name.localeCompare(b.name, 'zh-CN');
            });
            
            renderResults();
        }

        // 判断是否过期
        function isExpired(dateStr) {
            if (!dateStr || dateStr === '2099-12-31') return false;
            const expireDate = new Date(dateStr);
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            return expireDate < today;
        }

        // 获取车辆类型样式类
        function getTypeClass(type) {
            const map = {
                '教师车辆': 'type-teacher',
                '家长车辆': 'type-parent',
                '临时车辆': 'type-temp',
                '后勤车辆': 'type-logistics',
                '集团车辆': 'type-group'
            };
            return map[type] || '';
        }

        // 高亮文本
        function highlightText(text, keyword) {
            if (!keyword) return text;
            const regex = new RegExp(`(${escapeRegex(keyword)})`, 'gi');
            return text.replace(regex, '<span class="highlight">$1</span>');
        }

        // 转义正则特殊字符
        function escapeRegex(str) {
            return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        }

        // 渲染结果
        function renderResults() {
            const container = document.getElementById('resultsContainer');
            const countEl = document.getElementById('resultCount');
            
            countEl.textContent = filteredData.length;
            
            if (filteredData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔍</div>
                        <h3>未找到匹配的车辆</h3>
                        <p>请尝试其他搜索关键词或筛选条件</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <div class="table-wrapper">
                    <table>
                        <thead>
                            <tr>
                                <th>序号</th>
                                <th>车牌号</th>
                                <th>车主姓名</th>
                                <th>车辆类型</th>
                                <th>有效期至</th>
                            </tr>
                        </thead>
                        <tbody>
            `;
            
            filteredData.forEach((item, index) => {
                const expired = isExpired(item.expireDate);
                const rowClass = expired ? 'expired' : '';
                
                html += `
                    <tr class="${rowClass}">
                        <td>${index + 1}</td>
                        <td><strong>${highlightText(item.plate, searchKeyword)}</strong></td>
                        <td>${highlightText(item.name, searchKeyword)}</td>
                        <td><span class="type-tag ${getTypeClass(item.department)}">${item.department}</span></td>
                        <td>${item.expireDate}${expired ? '<span class="expired-badge">已过期</span>' : ''}</td>
                    </tr>
                `;
            });
            
            html += `
                        </tbody>
                    </table>
                </div>
            `;
            
            container.innerHTML = html;
        }
    </script>
</body>
</html>
